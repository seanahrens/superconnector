; Sleep-Med Decision Device firmware
; Two build envs sharing one source tree; first env is the default for `pio run`.

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
lib_deps =
    m5stack/M5Atom
    fastled/FastLED
    bblanchon/ArduinoJson

[env:atom-lite]
extends = common
board = m5stack-atom
build_flags = -DHAVE_SPEAKER=0 -DBOARD_ATOM_LITE=1

[env:atom-echo]
extends = common
board = m5stack-atom
build_flags = -DHAVE_SPEAKER=1 -DBOARD_ATOM_ECHO=1
