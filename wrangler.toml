name = "superconnector"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Local dev defaults; secrets are configured via `wrangler secret put`.
[vars]
ENVIRONMENT = "production"

# Cloudflare D1 (SQLite). Run `wrangler d1 create superconnector` once and
# paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "superconnector"
database_id = "3b2daa13-4e73-4fdf-b5a9-60fd66f81268"
migrations_dir = "migrations"

# Cloudflare Vectorize for semantic person search.
# Run `wrangler vectorize create people-context --dimensions=768 --metric=cosine`
# once before first deploy.
[[vectorize]]
binding = "VECTORS"
index_name = "people-context"

# Workers AI: embeddings model `@cf/baai/bge-base-en-v1.5` (768-dim).
[ai]
binding = "AI"

# Cloudflare Email Workers — sends the daily email.
# Prereq: a domain on Cloudflare with Email Routing enabled, and the
# EMAIL_TO address verified as a destination in Email Routing settings.
[[send_email]]
name = "EMAIL"

# Cron triggers:
#   */5 * * * *   ingest new Granola notes
#   0 13 * * *    daily email at 06:00 America/Los_Angeles (13:00 UTC)
#
# If you ever migrate scheduling to /cron-hub, remove this block, redeploy,
# and add equivalent entries to cron-hub/src/index.ts.
[triggers]
crons = ["*/5 * * * *", "0 13 * * *"]

# Observability
[observability]
enabled = true
